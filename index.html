<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>BOT.EXE Download Portal</title>
<link href="https://fonts.googleapis.com/css?family=Share+Tech+Mono|Orbitron:700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#00ff00;
  --bg:#010101;
  --fade:#000a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--primary);
  font-family:'Share Tech Mono',monospace;
  overflow:hidden;
}

/* full‑screen canvas for particles/network */
#bgcanvas{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  z-index:-3;
}

/* holographic container */
.holo{
  position:fixed;
  top:0;left:0;
  width:100vw;height:100vh;
  perspective:1200px;
  pointer-events:none;
}
.card{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  transform-origin:center center;
  width:90vw;max-width:480px;
  padding:50px 30px;
  background:rgba(0,0,0,.65);
  border:2px solid var(--primary);
  border-radius:16px;
  box-shadow:0 0 40px var(--primary),0 0 120px var(--primary) inset;
  backdrop-filter:blur(4px);
  pointer-events:auto;
}
@keyframes float{
  0%,100%{transform:translate(-50%,-50%) rotateX(0) rotateY(0) scale(1);}
  50%{transform:translate(-50%,-50%) rotateX(2deg) rotateY(2deg) scale(1.02);}
}
.card{animation:float 6s ease-in-out infinite;}

h1{
  font-family:'Orbitron',sans-serif;
  font-size:2.75rem;
  letter-spacing:3px;
  white-space:nowrap;
  overflow:hidden;
  border-right:3px solid var(--primary);
  display:inline-block;
}
h1.fixed{border-right:none;}

h1.glitch{
  position:relative;
}
h1.glitch::before,
h1.glitch::after{
  content:attr(data-text);
  position:absolute;
  left:0;top:0;
  width:100%;height:100%;
  clip:rect(0,9999px,0,0);
}
h1.glitch::before{
  animation:glitch1 2s infinite linear;
  color:#f0f;
}
h1.glitch::after{
  animation:glitch2 3s infinite linear;
  color:#0ff;
}
@keyframes glitch1{
  0%{clip:rect(0,9999px,0,0);}
  10%{clip:rect(0,9999px,20px,0);}
  20%{clip:rect(10px,9999px,30px,0);}
  30%{clip:rect(5px,9999px,25px,0);}
  40%{clip:rect(15px,9999px,35px,0);}
  50%{clip:rect(0,9999px,0,0);}
}
@keyframes glitch2{
  0%{clip:rect(0,9999px,0,0);}
  15%{clip:rect(20px,9999px,40px,0);}
  30%{clip:rect(2px,9999px,22px,0);}
  45%{clip:rect(18px,9999px,38px,0);}
  60%{clip:rect(0,9999px,0,0);}
}

p{margin:1rem 0;line-height:1.4;}

button.download-btn{
  position:relative;
  display:inline-block;
  padding:15px 40px;
  background:var(--primary);
  color:#000;
  font-weight:700;
  font-size:1rem;
  border:2px solid var(--primary);
  border-radius:8px;
  cursor:pointer;
  overflow:hidden;
  transition:transform .2s,box-shadow .2s;
}
button.download-btn:hover{
  box-shadow:0 0 30px var(--primary);
  transform:scale(1.05);
}
button.download-btn:active{
  transform:scale(0.95);
}
button.download-btn .ripple{
  position:absolute;
  border-radius:50%;
  background:rgba(0,0,0,.3);
  transform:scale(0);
  animation:ripple 0.6s linear;
}
@keyframes ripple{
  to{transform:scale(4);opacity:0;}
}

.footer{
  margin-top:2.5rem;
  font-size:.75rem;
  opacity:.6;
  text-align:center;
}

/* small mobile adjustments */
@media(max-width:480px){
  h1{font-size:2rem;}
  .card{padding:40px 20px;}
}
</style>
</head>
<body>

<canvas id="bgcanvas"></canvas>

<div class="holo">
  <div class="card" id="card">
    <h1 id="title" data-text="&gt; BOT.EXE"></h1>
    <p>Version 1.0<br>Secure │ Fast │ Old‑school</p>
    <a href="bot.exe" download>
      <button class="download-btn" id="dlbtn">DOWNLOAD</button>
    </a>
    <div class="footer">© 1999‑2026 BOT SYSTEMS</div>
  </div>
</div>

<script>
// background particle network
(function(){
  const c=document.getElementById('bgcanvas'),ctx=c.getContext('2d');
  let w,h,particles=[];
  function init(){
    w=c.width=innerWidth; h=c.height=innerHeight;
    particles=[];
    for(let i=0;i<200;i++){
      particles.push({
        x:Math.random()*w,
        y:Math.random()*h,
        vx:(Math.random()-0.5)*0.6,
        vy:(Math.random()-0.5)*0.6,
        r:1+Math.random()*3
      });
    }
  }
  function draw(){
    ctx.fillStyle='rgba(1,1,1,0.2)';
    ctx.fillRect(0,0,w,h);
    ctx.fillStyle=ctx.strokeStyle='#0f0';
    particles.forEach((p,i)=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>w) p.vx*=-1;
      if(p.y<0||p.y>h) p.vy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,2*Math.PI);
      ctx.fill();
      for(let j=i+1;j<particles.length;j++){
        let q=particles[j];
        let dx=p.x-q.x, dy=p.y-q.y, d=Math.hypot(dx,dy);
        if(d<100){
          ctx.lineWidth=1-d/100;
          ctx.beginPath();
          ctx.moveTo(p.x,p.y);
          ctx.lineTo(q.x,q.y);
          ctx.stroke();
        }
      }
    });
  }
  init();
  setInterval(draw,33);
  window.addEventListener('resize',init);
})();

// typewriter + glitch
document.addEventListener('DOMContentLoaded',()=>{
  const h=document.getElementById('title');
  const txt=h.getAttribute('data-text');
  let i=0;
  function type(){
    if(i<txt.length){
      h.textContent+=txt[i++];
      setTimeout(type,50 + Math.random()*100);
    } else {
      h.classList.add('fixed','glitch');
      h.addEventListener('animationiteration',()=>{
        setTimeout(()=>h.textContent=txt,Math.random()*1000);
      });
    }
  }
  type();
});

// card parallax
document.addEventListener('mousemove', e => {
    const card = document.getElementById('card');
    const x = (e.clientX / window.innerWidth  - 0.5) * 30;
    const y = (e.clientY / window.innerHeight - 0.5) * -30;
    card.style.transform = `translate(-50%,-50%) rotateY(${x}deg) rotateX(${y}deg)`;
});

// button ripple
document.getElementById('dlbtn').addEventListener('click',e=>{
  const b=e.currentTarget;
  const r=document.createElement('span');
  r.className='ripple';
  const d=Math.max(b.clientWidth,b.clientHeight);
  r.style.width=r.style.height=d+'px';
  const rect=b.getBoundingClientRect();
  r.style.left=e.clientX-rect.left-d/2+'px';
  r.style.top=e.clientY-rect.top-d/2+'px';
  b.appendChild(r);
  r.addEventListener('animationend',()=>r.remove());
});
</script>

</body>
</html>
